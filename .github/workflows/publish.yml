name: Publish

on:
  release:
    types: [published]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25', '1.26']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Test
        run: go test ./... -race -count=1

      - name: Vet
        run: go vet ./...

  index:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Request pkg.go.dev indexing
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          curl -s "https://proxy.golang.org/github.com/agentine/stanza/@v/${VERSION}.info" || true
          curl -s "https://sum.golang.org/lookup/github.com/agentine/stanza@${VERSION}" || true
          echo "Requested indexing for github.com/agentine/stanza@${VERSION}"
          echo "pkg.go.dev: https://pkg.go.dev/github.com/agentine/stanza@${VERSION}"
